name = "cube"

# Liste des textures utilisées (référencables avec #texture)
[textures]
texture = "stone"

# Éléments du modèle (cuboids)
[[elements]]
# Bounds en coordonnées [0-16] (comme Minecraft)
from = [0.0, 0.0, 0.0]
to = [16.0, 16.0, 16.0]

# Faces de l'élément
[elements.faces.top]
texture = "#texture"
enabled = true
[elements.faces.bottom]
texture = "#texture"
enabled = true
[elements.faces.north]
texture = "#texture"
enabled = true
[elements.faces.south]
texture = "#texture"
enabled = true
[elements.faces.east]
texture = "#texture"
enabled = true
[elements.faces.west]
texture = "#texture"
enabled = true

render_type = "opaque"
collidable = true
